# vim: expandtab tabstop=2 shiftwidth=2
name: CI

on:
  workflow_dispatch:
    inputs:
      unk:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # Daily
    - cron: '0 8 * * *'
    # Every 3 days
    #- cron: '0 0 */3 * *'

env:
  GRADLE_VERSION: '8.5'
  JAVA_VERSION: '21'

jobs:
  build:
    name: 'Build Ghidra - ${{ matrix.platform.os }} - ${{ matrix.ghidra.version }}'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: 'ubuntu-latest'
            dependency_script: "sudo apt-get update && sudo apt-get install -y bison flex"
          - os: 'macos-latest'
            dependency_script: "brew install bison flex curl"
          - os: 'windows-latest'
            dependency_script: |
              choco install visualstudio2017buildtools
              choco install winflexbison
              ren "C:\ProgramData\chocolatey\bin\win_bison.exe" "bison.exe"
              ren "C:\ProgramData\chocolatey\bin\win_flex.exe" "flex.exe"
              
        ghidra:
          - version: 'dev'
            ref: 'master'
          - version: 'stable'
            ref: 'stable'
    runs-on: "${{ matrix.platform.os }}"
    steps:
      - uses: actions/checkout@v4
      - name: 'Set up JDK'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: "Install dependencies"
        run: "${{ matrix.platform.dependency_script }}"
      
      - name: "Clone Ghidra"
        run: git clone -b "${{ matrix.ghidra.ref }}" "https://github.com/NationalSecurityAgency/ghidra.git" ghidra
      #- name: "Apply patches"
      #  run: git apply ../patches/*
      #  working-directory: ./ghidra
      - name: "Recent history"
        run: git log --oneline -n 15
        working-directory: ./ghidra
        
      #- name: Setup tmate session
      #  uses: mxschmitt/action-tmate@v3

      # Cache dependencies' downloading
      - name: "Precreate download dir"
        run: mkdir -p ghidra/dependencies/downloads
      - name: "Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          # A list of files, directories, and wildcard patterns to cache and restore
          path: ./ghidra/dependencies/downloads
          # An explicit key for restoring and saving the cache
          key: "${{ matrix.ghidra.version }}-${{ matrix.platform.os }}-ghdepends"
      - name: "Set up Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
      - name: "Fetch dependencies"
        run: gradle --console plain --quiet --init-script gradle/support/fetchDependencies.gradle init
        working-directory: ./ghidra
      
      - name: "Building Ghidra ${{ matrix.ghidra.version }} from ${{ matrix.ghidra.ref }}"
        run: gradle --console plain --quiet buildGhidra
        working-directory: ./ghidra
      
      - name: "Upload package"
        uses: actions/upload-artifact@v4
        with:
          name: "Ghidra_${{ matrix.ghidra.version }}_${{ matrix.platform.os }}"
          path: "ghidra/build/dist/*.zip"
      #- name: "Upload package"
      #  uses: NyaMisty/upload-artifact-as-is@nightly
      #  with:
      #    path: ghidra/build/dist/
  deploy:
    name: 'Push to Release'
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir dist
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: dist
      - name: Check required artifacts
        id: gate
        shell: bash
        run: |
          linux_count=$(find dist -type f -name '*ubuntu-latest*.zip' | awk 'END { print NR }')
          windows_count=$(find dist -type f -name '*windows-latest*.zip' | awk 'END { print NR }')
          echo "linux_count=$linux_count" >> "$GITHUB_OUTPUT"
          echo "windows_count=$windows_count" >> "$GITHUB_OUTPUT"
          if [ "$linux_count" -gt 0 ] && [ "$windows_count" -gt 0 ]; then
            echo "release_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Rearrange artifacts
        if: ${{ steps.gate.outputs.release_ok == 'true' }}
        run: |
          mkdir dist1
          find dist -type f -name "*" -exec sh -c 'mv "{}" "dist1/$( basename "$( dirname "{}" )" )_$( basename "{}" )"' \;
      - name: Get current date
        id: date
        if: ${{ steps.gate.outputs.release_ok == 'true' }}
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Pushing to release
        if: ${{ steps.gate.outputs.release_ok == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          name: "GhidraNightlyBuild-${{ steps.date.outputs.date }}"
          commit: ${{ github.sha }}
          tag: "GhidraNightlyBuild-${{ steps.date.outputs.date }}"
          artifacts: "dist1/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: NyaMisty/keepalive-workflow@v2 # using the workflow with default settings
